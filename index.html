<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plant Tracker Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #eef7ee;
      padding: 20px;
    }
    input, button {
      padding: 8px;
      margin: 5px;
    }
    .plant {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-left: 5px solid green;
    }
  </style>
</head>
<body>

<h1>🌱 Plant Tracker</h1>

<!-- LOGIN -->
<div id="auth">
  <h3>Login / Register</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <button onclick="logout()">Logout</button>

  <h3>Add Plant</h3>
  <input id="name" placeholder="Name">
  <input id="days" type="number" placeholder="Water every X days">
  <button onclick="addPlant()">Add</button>

  <div id="plants"></div>
</div>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyC-dkeiBKMSRb2IPUTGO7Ua7YDFpBKJQeA",
    authDomain: "planty-d4f1a.firebaseapp.com",
    projectId: "planty-d4f1a",
    storageBucket: "planty-d4f1a.firebasestorage.app",
    messagingSenderId: "492934596067",
    appId: "1:492934596067:web:8c31cb24c00a9e593a0cd6",
    measurementId: "G-X1H2NJK7S0"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  
  // Initialize Auth and Firestore with proper imports
  window.auth = getAuth(app);
  window.db = getFirestore(app);
</script>

<script>
/* =========================
   🔐 AUTH
   ========================= */

function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .catch(error => {
      alert("Registration error: " + error.message);
    });
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .catch(error => {
      alert("Login error: " + error.message);
    });
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadPlants();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

/* =========================
   🌱 PLANTS
   ========================= */

async function addPlant() {
  const name = document.getElementById("name").value;
  const days = parseInt(document.getElementById("days").value);

  if (!name || !days || days <= 0) {
    alert("Please enter a valid plant name and watering interval");
    return;
  }

  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    return;
  }

  try {
    await db.collection("plants").add({
      userId: user.uid,
      name,
      interval: days,
      lastWatered: Date.now()
    });

    document.getElementById("name").value = "";
    document.getElementById("days").value = "";
    loadPlants();
  } catch (error) {
    alert("Error adding plant: " + error.message);
  }
}

async function loadPlants() {
  const user = auth.currentUser;
  
  if (!user) return;

  try {
    const snapshot = await db.collection("plants")
      .where("userId", "==", user.uid)
      .get();

    const container = document.getElementById("plants");
    container.innerHTML = "";

    if (snapshot.empty) {
      container.innerHTML = "<p>No plants yet. Add one above!</p>";
      return;
    }

    snapshot.forEach(doc => {
      const plant = doc.data();

      const now = Date.now();
      const daysPassed = (now - plant.lastWatered) / (1000*60*60*24);
      const daysLeft = Math.ceil(plant.interval - daysPassed);

      const div = document.createElement("div");
      div.className = "plant";

      div.innerHTML = `
        <b>${plant.name}</b><br>
        ${daysLeft <= 0 ? "⚠️ Needs water!" : daysLeft + " days left"}
        <br>
        <button onclick="waterPlant('${doc.id}')">Watered</button>
        <button onclick="deletePlant('${doc.id}')">Delete</button>
      `;

      container.appendChild(div);
    });
  } catch (error) {
    console.error("Error loading plants:", error);
  }
}

async function waterPlant(id) {
  try {
    await db.collection("plants").doc(id).update({
      lastWatered: Date.now()
    });
    loadPlants();
  } catch (error) {
    alert("Error updating plant: " + error.message);
  }
}

async function deletePlant(id) {
  try {
    await db.collection("plants").doc(id).delete();
    loadPlants();
  } catch (error) {
    alert("Error deleting plant: " + error.message);
  }
}

/* =========================
   🔔 NOTIFICATIONS
   ========================= */

function askNotification() {
  Notification.requestPermission();
}

setInterval(checkPlants, 60000);

async function checkPlants() {
  const user = auth.currentUser;
  if (!user) return;

  try {
    const snapshot = await db.collection("plants")
      .where("userId", "==", user.uid)
      .get();

    snapshot.forEach(doc => {
      const plant = doc.data();

      const now = Date.now();
      const daysPassed = (now - plant.lastWatered) / (1000*60*60*24);

      if (daysPassed >= plant.interval) {
        if (Notification.permission === "granted") {
          new Notification("🌱 Water time!", {
            body: plant.name + " needs water"
          });
        }
      }
    });
  } catch (error) {
    console.error("Error checking plants:", error);
  }
}
</script>

</body>
</html>
